name: Windows Package

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        env:
          NODE_ENV: development
          NPM_CONFIG_PRODUCTION: 'false'
          NPM_CONFIG_OMIT: ''
        run: npm ci --legacy-peer-deps

      - name: Inspect frontend install
        working-directory: frontend
        shell: bash
        run: |
          pwd
          node --version
          npm --version
          npm config get omit
          npm config get production
          npm config get bin-links
          ls -la
          ls -la node_modules
          ls -la node_modules/.bin || true
          node -e "const fs=require('fs'); console.log(JSON.stringify({ vitePackage: fs.existsSync('node_modules/vite/package.json'), viteBin: fs.existsSync('node_modules/vite/bin/vite.js'), viteShim: fs.existsSync('node_modules/.bin/vite') }, null, 2))"
          npm ls vite || true

      - name: Verify frontend toolchain
        working-directory: frontend
        shell: bash
        run: |
          test -f node_modules/vite/bin/vite.js
          node node_modules/vite/bin/vite.js --version

      - name: Build frontend
        working-directory: frontend
        env:
          CI: false
          NODE_ENV: development
        run: node node_modules/vite/bin/vite.js build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          if-no-files-found: error

  build-windows:
    runs-on: windows-latest
    needs: build-frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Install backend build dependencies
        shell: powershell
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt pyinstaller

      - name: Install root desktop dependencies
        shell: powershell
        run: npm ci --legacy-peer-deps

      - name: Build Windows desktop packages
        shell: powershell
        env:
          CI: false
        run: npm run build:win

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: second-brain-ai-windows
          path: |
            dist/*.exe
            dist/*.zip
          if-no-files-found: error

      - name: Publish tag release assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.exe
            dist/*.zip
          generate_release_notes: true
