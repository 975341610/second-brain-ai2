name: Windows Package

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install frontend dependencies
        working-directory: frontend
        shell: powershell
        run: npm ci --include=dev --legacy-peer-deps

      - name: Build frontend
        working-directory: frontend
        shell: powershell
        env:
          CI: false
        run: npm run build

      - name: Install backend build dependencies
        shell: powershell
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt pyinstaller

      - name: Install root desktop dependencies
        shell: powershell
        run: npm ci --legacy-peer-deps

      - name: Build Windows desktop packages
        shell: powershell
        env:
          CI: false
        run: npm run build:win

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: second-brain-ai-windows
          path: |
            dist/*.exe
            dist/*.zip
          if-no-files-found: error

      - name: Publish tag release assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.exe
            dist/*.zip
          generate_release_notes: true
